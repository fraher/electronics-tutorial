suggested_wokwi_project_id: null
takeaways:
  - "Any switch that breaks its own driving supply will oscillate."
  - "Relay oscillators are slow (tens of Hz) because they depend on physical motion of the armature."
  - "A capacitor in parallel with an inductive coil lengthens the time required to change the coil's current."
  - "The breadboard's bus strips run horizontally for power and vertically for components — match this convention."
  - "Strip jumper wires using the right-sized notch on a wire stripper to avoid nicking the conductor."
notes_for_implementer: |
  This experiment is half "oscillator concept" and half "learn the breadboard." Consider splitting the page
  into a top section with an animation of the chattering relay and a bottom section with a labeled breadboard
  layout. The capacitor-slows-oscillation behavior is the most rewarding interactive parameter.
