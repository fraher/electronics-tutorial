suggested_wokwi_project_id: null
takeaways:
  - "Switches are described by poles (independent circuits) and throws (positions)."
  - "Continuity mode on a multimeter is a fast way to map an unfamiliar switch's pin functions."
  - "Two SPDT switches wired series-parallel give 'three-way' switching used in staircases."
  - "Momentary switches return to a default state; alternate-action switches stay where you leave them."
  - "Switches are rated for current; sparking during contact damages cheap or underrated switches."
notes_for_implementer: |
  The interactive should let the learner click two virtual SPDT switches and watch the LED state. A truth
  table panel showing all four position combinations updating live would reinforce the analogy with logic.
  Also include a "switch zoo" callout showing SPST / SPDT / DPDT / 3PDT symbols.
