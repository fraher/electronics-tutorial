suggested_wokwi_project_id: null
takeaways:
  - "Logic gates compute Boolean functions of binary inputs."
  - "74HC ICs operate from 2 V to 6 V; thresholds are about 70% (HIGH) and 30% (LOW) of Vcc."
  - "Inputs must always be tied HIGH or LOW — never left floating."
  - "Decoupling capacitors (0.1 µF) belong on every logic IC's Vcc pin."
  - "AND = product, OR = sum, NAND/NOR = inverted versions of those."
notes_for_implementer: |
  A truth-table widget where the learner clicks input buttons and sees the output LED update for each gate
  type is the canonical interactive. Display all four truth tables side by side; this is how the relations
  between gates (especially NAND vs AND, NOR vs OR) become memorable.
