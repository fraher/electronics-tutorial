suggested_wokwi_project_id: null
takeaways:
  - "Reed switches are simple magnetic sensors — a magnet closes the contacts."
  - "A normally-closed sensor loop is 'supervised': cutting a wire trips the alarm."
  - "Latching with a relay's own contact holds the alarm on after the trigger ends."
  - "A reset switch must break the latch — momentarily interrupt the hold path."
  - "Pair a latch with a 555 astable for an audible alarm output."
notes_for_implementer: |
  This is a system-level page — show a block diagram (sensors → latch → tone generator → speaker) before
  diving into the schematic. The interactive could let the learner click a "door open" toggle to trigger
  the latch and a "reset" button to clear it, with an animated piezo icon producing sound while latched.
