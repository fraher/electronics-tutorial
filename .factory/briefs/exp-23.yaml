  trace which Q maps to which LEDs.
suggested_wokwi_project_id: null
takeaways:
  - "A counter clocked too fast for the eye, then frozen on user input, behaves as a random selector."
  - "A 4017 decade counter with Q6→reset produces a modulo-6 (dice-friendly) sequence."
  - "Dot patterns are decoded with a small lookup of AND gates — one per face."
  - "Sharing a current-limiting resistor between several LEDs reduces brightness equalisation; individual resistors are cleaner."
  - "The same architecture (fast clock + freeze) generalises to slot machines and random-number gadgets."
notes_for_implementer: |
  Interactive: a virtual roll button that visually cycles the dice face when held, freezing on release.
  Showing the 4017 Q outputs as numbered LEDs alongside the die face helps learners see the mapping. A
  histogram of outcomes over many rolls would demonstrate that the result is effectively uniform.
