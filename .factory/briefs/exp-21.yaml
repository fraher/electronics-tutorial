suggested_wokwi_project_id: null
takeaways:
  - "Two cross-coupled NAND gates form an SR latch — the simplest one-bit memory."
  - "An active-LOW NAND latch sets when S goes LOW and resets when R goes LOW."
  - "Both inputs LOW at once is forbidden — the latch state is undefined."
  - "Cascading SR latches with a shared reset produces a quiz-show 'first-press wins' system."
  - "All clocked flip-flops are extensions of this basic latch idea."
notes_for_implementer: |
  Use a step-by-step interactive truth-table walker: click S or R, see the latch state flip, watch the
  cross-coupled signals propagate. Showing the feedback loops as animated highlighted wires when a state
  change happens drives home why memory is possible.
